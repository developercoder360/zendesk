services:
  web:
    image: nginx:1.26-alpine
    container_name: laravel_web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        uid: ${UID:-1000}
        user: laravel
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        uid: ${UID:-1000}
        user: laravel
    container_name: laravel_queue
    restart: unless-stopped
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    volumes:
      - ./:/var/www/html
      - ./docker/php/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    depends_on:
      - app
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        uid: ${UID:-1000}
        user: laravel
    container_name: laravel_scheduler
    restart: unless-stopped
    command: ["cron", "-f"]
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - app-network

  pgsql:
    image: pgvector/pgvector:pg18
    container_name: laravel_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zendesk}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - pgsql_data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-zendesk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.20.0
    container_name: laravel_mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - app-network

  node:
    image: node:22-alpine
    container_name: laravel_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: ["npm", "run", "dev"]
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgsql_data:
    driver: local
  redis_data:
    driver: local
